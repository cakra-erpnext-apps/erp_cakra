name: erp_cakra_prod

x-frappe-image: &frappe-image
  image: cakra-erpnext:prod
  pull_policy: never

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-depends-configurator: &depends-configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-app-volumes: &app-volumes
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs
  - ./erp:/home/frappe/frappe-bench/apps/erp
  - ./erpnext_custom:/home/frappe/frappe-bench/apps/erpnext_custom
  - ./assistant:/home/frappe/frappe-bench/apps/assistant
  - ./crm_cakra:/home/frappe/frappe-bench/apps/crm_cakra
  - ./ensure-apps.sh:/scripts/ensure-apps.sh:ro

services:
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?DB_ROOT_PASS missing}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb-data:/var/lib/mysql
    networks: [frappe_net]
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    volumes: [redis-cache-data:/data]
    networks: [frappe_net]

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    volumes: [redis-queue-data:/data]
    networks: [frappe_net]

  configurator:
    <<: *frappe-image
    command: ["bash", "-c", "set -euo pipefail; cd /home/frappe/frappe-bench; printf 'frappe\\nerpnext\\nhrms\\ntelephony\\nhelpdesk\\nraven\\ngameplan\\n' > sites/apps.txt; bench set-config -g db_host mariadb; bench set-config -g db_port 3306; bench set-config -g redis_cache redis://redis-cache:6379; bench set-config -g redis_queue redis://redis-queue:6379; bench set-config -g redis_socketio redis://redis-cache:6379; bench set-config -g socketio_port 9000; echo '[configurator] Done.'"]
    depends_on:
      mariadb:
        condition: service_healthy
    volumes: *app-volumes
    networks: [frappe_net]

  backend:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["bash", "/scripts/ensure-apps.sh", "start.sh"]
    environment:
      BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra"
      MATERIALIZE_ASSETS: "1"
    volumes: *app-volumes
    networks: [frappe_net]

  frontend:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${SITE_NAME:-app.cakraindo.com}
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    ports:
      - "127.0.0.1:${HTTP_PORT:-18089}:8080"
    networks: [frappe_net]

  websocket:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes: *app-volumes
    networks: [frappe_net]

  queue-short:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["bash", "/scripts/ensure-apps.sh", "bench", "worker", "--queue", "short,default"]
    environment: {BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra", MATERIALIZE_ASSETS: "1"}
    volumes: *app-volumes
    networks: [frappe_net]

  queue-default:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["bash", "/scripts/ensure-apps.sh", "bench", "worker", "--queue", "default"]
    environment: {BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra", MATERIALIZE_ASSETS: "1"}
    volumes: *app-volumes
    networks: [frappe_net]

  queue-long:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["bash", "/scripts/ensure-apps.sh", "bench", "worker", "--queue", "long,default,short"]
    environment: {BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra", MATERIALIZE_ASSETS: "1"}
    volumes: *app-volumes
    networks: [frappe_net]

  scheduler:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command: ["bash", "/scripts/ensure-apps.sh", "bench", "schedule"]
    environment: {BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra", MATERIALIZE_ASSETS: "1"}
    volumes: *app-volumes
    networks: [frappe_net]

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_net:
    driver: bridge

