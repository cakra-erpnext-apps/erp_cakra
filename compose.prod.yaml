name: erp_cakra_prod

x-frappe-image: &frappe-image
  image: cakra-erpnext:prod
  pull_policy: never

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-depends-configurator: &depends-configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-app-volumes: &app-volumes
  - sites:/home/frappe/frappe-bench/sites
  - logs:/home/frappe/frappe-bench/logs
  - ./erp:/home/frappe/frappe-bench/apps/erp
  - ./erpnext_custom:/home/frappe/frappe-bench/apps/erpnext_custom
  - ./assistant:/home/frappe/frappe-bench/apps/assistant
  - ./crm_cakra:/home/frappe/frappe-bench/apps/crm_cakra
  - ./ensure-apps.sh:/home/frappe/frappe-bench/ensure-bundles.sh:ro

x-bundle-env: &bundle-env
  BUNDLE_APPS: "erp erpnext_custom assistant crm_cakra"
  MATERIALIZE_ASSETS: "1"

services:
  mariadb:
    image: mariadb:10.6
    restart: unless-stopped
    <<: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:?DB_ROOT_PASS missing}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb-data:/var/lib/mysql
    networks: [frappe_net]
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    volumes: [redis-cache-data:/data]
    networks: [frappe_net]

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    <<: *default-logging
    volumes: [redis-queue-data:/data]
    networks: [frappe_net]

  configurator:
    <<: *frappe-image
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        cd /home/frappe/frappe-bench
        printf 'frappe\nerpnext\nhrms\ntelephony\nhelpdesk\nraven\ngameplan\n' > sites/apps.txt
        bench set-config -g db_host mariadb
        bench set-config -g db_port 3306
        bench set-config -g redis_cache redis://redis-cache:6379
        bench set-config -g redis_queue redis://redis-queue:6379
        bench set-config -g redis_socketio redis://redis-cache:6379
        bench set-config -g socketio_port 9000
        echo '[configurator] Done.'
    depends_on:
      mariadb:
        condition: service_healthy
    volumes: *app-volumes
    networks: [frappe_net]

  backend:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && ./env/bin/gunicorn --chdir=/home/frappe/frappe-bench/sites --bind=0.0.0.0:8000 --threads=4 --workers=2 --worker-class=gthread --worker-tmp-dir=/dev/shm --timeout=120 frappe.app:application'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    <<: *default-logging
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - sites:/home/frappe/frappe-bench/sites:ro
    ports:
      - "127.0.0.1:${HTTP_PORT:-18089}:80"
    networks: [frappe_net]

  websocket:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && node apps/frappe/socketio.js'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

  queue-short:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && bench worker --queue short'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

  queue-default:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && bench worker --queue default'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

  queue-long:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && bench worker --queue long'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

  scheduler:
    <<: [*frappe-image, *depends-configurator, *default-logging]
    restart: unless-stopped
    command:
      - bash
      - -c
      - |
        BUNDLE_APPS='erp erpnext_custom assistant crm_cakra' bash /home/frappe/frappe-bench/ensure-bundles.sh bash -c 'cd /home/frappe/frappe-bench && bench schedule'
    environment: *bundle-env
    volumes: *app-volumes
    networks: [frappe_net]

volumes:
  mariadb-data:
  redis-cache-data:
  redis-queue-data:
  sites:
  logs:

networks:
  frappe_net:
    driver: bridge
